<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CipherChat — Secure Messenger</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg-deep:#0a0c14;
  --sidebar-bg:#0f1120;
  --sidebar-border:rgba(255,255,255,0.06);
  --chat-bg:#101325;
  --header-bg:rgba(15,17,32,0.85);
  --input-bg:rgba(255,255,255,0.05);
  --input-border:rgba(255,255,255,0.08);
  --accent:#6c63ff;
  --accent-glow:rgba(108,99,255,0.3);
  --accent2:#8b5cf6;
  --sent-bg:linear-gradient(135deg,#6c63ff,#8b5cf6);
  --received-bg:rgba(255,255,255,0.06);
  --text-primary:#e8eaf0;
  --text-secondary:#6b7084;
  --text-dim:#4a4e63;
  --online:#00e676;
  --divider:rgba(255,255,255,0.04);
  --danger:#ff4d6a;
  --success:#00e676;
}
html,body{height:100%;overflow:hidden;}
body{
  font-family:'Inter',system-ui,sans-serif;
  background:var(--bg-deep);color:var(--text-primary);
  display:flex;height:100vh;
}

/* ===== SIDEBAR ===== */
.sidebar{
  width:340px;min-width:340px;
  background:var(--sidebar-bg);
  border-right:1px solid var(--sidebar-border);
  display:flex;flex-direction:column;
  transition:width .3s;
}
.sidebar-header{
  padding:20px 20px 16px;
  border-bottom:1px solid var(--divider);
}
.sidebar-header .brand{
  display:flex;align-items:center;gap:10px;margin-bottom:16px;
}
.sidebar-header .brand svg{width:28px;height:28px;color:var(--accent);}
.sidebar-header .brand h1{font-size:18px;font-weight:700;letter-spacing:-.3px;}
.sidebar-header .brand h1 span{color:var(--accent);}
.sidebar-header .brand .user-badge{
  margin-left:auto;font-size:11px;font-weight:500;
  padding:4px 10px;border-radius:20px;
  background:rgba(108,99,255,0.12);color:var(--accent);
}

/* Search */
.search-box{
  position:relative;
}
.search-box input{
  width:100%;padding:10px 14px 10px 38px;
  background:var(--input-bg);border:1px solid var(--input-border);
  border-radius:10px;color:var(--text-primary);
  font-size:13px;font-family:inherit;outline:none;
  transition:border-color .25s,box-shadow .25s;
}
.search-box input::placeholder{color:var(--text-dim);}
.search-box input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow);}
.search-box svg{
  position:absolute;left:12px;top:50%;transform:translateY(-50%);
  width:16px;height:16px;color:var(--text-dim);pointer-events:none;
}

/* Contact list */
.contacts{flex:1;overflow-y:auto;padding:8px 0;}
.contacts::-webkit-scrollbar{width:4px;}
.contacts::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:4px;}

.contact{
  display:flex;align-items:center;gap:14px;
  padding:14px 20px;cursor:pointer;
  transition:background .2s;position:relative;
}
.contact:hover{background:rgba(255,255,255,.03);}
.contact.active{background:rgba(108,99,255,.1);border-left:3px solid var(--accent);}

.contact .avatar{
  width:44px;height:44px;min-width:44px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:16px;font-weight:600;color:#fff;
  position:relative;overflow:hidden;
}
.contact .avatar img{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
}
.contact .avatar .status-dot{
  position:absolute;bottom:1px;right:1px;
  width:10px;height:10px;border-radius:50%;
  background:var(--online);border:2px solid var(--sidebar-bg);
}

.contact .info{flex:1;min-width:0;}
.contact .info .name{font-size:14px;font-weight:600;margin-bottom:2px;}
.contact .info .last-msg{
  font-size:12px;color:var(--text-secondary);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}

/* Sidebar footer */
.sidebar-footer{
  padding:14px 20px;border-top:1px solid var(--divider);
}
.footer-actions{
  display:flex;
  align-items:center;
  justify-content:center;
  margin-bottom:12px;
}
.profile-icon-btn{
  width:38px;
  height:38px;
  border:none;
  border-radius:12px;
  background:rgba(108,99,255,0.14);
  color:var(--accent);
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  transition:transform .15s, background .2s;
}
.profile-icon-btn:hover{
  transform:translateY(-1px);
  background:rgba(108,99,255,0.22);
}
.profile-icon-btn svg{
  width:18px;
  height:18px;
}
.logout-btn{
  width:100%;padding:10px;border:none;border-radius:10px;
  background:rgba(255,77,106,0.1);color:var(--danger);
  font-size:13px;font-weight:600;font-family:inherit;cursor:pointer;
  transition:background .2s;
}
.logout-btn:hover{background:rgba(255,77,106,0.18);}

/* ===== CHAT AREA ===== */
.chat-area{
  flex:1;display:flex;flex-direction:column;
  background:var(--chat-bg);position:relative;
  overflow:hidden;
}

/* Chat header */
.chat-header{
  padding:16px 24px;
  background:var(--header-bg);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid var(--divider);
  display:flex;align-items:center;gap:14px;
  z-index:2;
}
.chat-header .avatar{
  width:40px;height:40px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:15px;font-weight:600;color:#fff;
  overflow:hidden;
}
.chat-header .avatar img{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
}
.chat-header .header-info .name{font-size:15px;font-weight:600;}
.chat-header .header-info .status-line{
  font-size:11px;color:var(--text-secondary);display:flex;align-items:center;gap:5px;
}
.chat-header .header-info .status-line .dot{
  width:7px;height:7px;border-radius:50%;background:var(--online);
}
.chat-header .e2ee-badge{
  margin-left:auto;display:flex;align-items:center;gap:5px;
  padding:5px 12px;border-radius:20px;
  background:rgba(0,230,118,.08);color:var(--success);
  font-size:11px;font-weight:500;
}
.chat-header .e2ee-badge svg{width:13px;height:13px;}

/* Messages */
.messages{
  flex:1;overflow-y:auto;padding:24px 28px;
  display:flex;flex-direction:column;gap:6px;
  background-image:
    radial-gradient(ellipse at 20% 50%, rgba(108,99,255,.04) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 50%, rgba(139,92,246,.04) 0%, transparent 50%);
}
.messages::-webkit-scrollbar{width:5px;}
.messages::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:4px;}

.msg{
  max-width:65%;padding:12px 16px;border-radius:18px;
  font-size:14px;line-height:1.55;position:relative;
  animation:msgIn .3s cubic-bezier(.22,1,.36,1);
  word-wrap:break-word;
}
@keyframes msgIn{0%{opacity:0;transform:translateY(8px) scale(.97);}100%{opacity:1;transform:none;}}

.msg.sent{
  align-self:flex-end;
  background:var(--sent-bg);color:#fff;
  border-bottom-right-radius:6px;
}
.msg.received{
  align-self:flex-start;
  background:var(--received-bg);
  border:1px solid rgba(255,255,255,.05);
  border-bottom-left-radius:6px;
}
.msg .meta{
  display:flex;align-items:center;gap:5px;justify-content:flex-end;
  margin-top:5px;font-size:10px;opacity:.6;
}
.msg .meta svg{width:10px;height:10px;}

/* Sender label for received messages */
.msg.received .sender-label{
  font-size:11px;font-weight:600;color:var(--accent);
  margin-bottom:4px;display:block;
}

/* Empty state */
.empty-state{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:16px;
  color:var(--text-dim);
}
.empty-state svg{width:80px;height:80px;color:var(--text-dim);opacity:.3;}
.empty-state h2{font-size:20px;font-weight:600;color:var(--text-secondary);}
.empty-state p{font-size:13px;max-width:280px;text-align:center;line-height:1.6;}

/* Input area */
.input-area{
  padding:16px 24px;
  background:var(--header-bg);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-top:1px solid var(--divider);
  display:flex;align-items:center;gap:12px;
  z-index:2;
}
.input-area input{
  flex:1;padding:14px 18px;
  background:var(--input-bg);border:1px solid var(--input-border);
  border-radius:14px;color:var(--text-primary);
  font-size:14px;font-family:inherit;outline:none;
  transition:border-color .25s,box-shadow .25s;
}
.input-area input::placeholder{color:var(--text-dim);}
.input-area input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow);}

.send-btn{
  width:46px;height:46px;border:none;border-radius:14px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:#fff;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:transform .15s,box-shadow .25s;
  box-shadow:0 4px 18px var(--accent-glow);
}
.send-btn:hover{transform:translateY(-1px);box-shadow:0 6px 24px var(--accent-glow);}
.send-btn:active{transform:translateY(0);}
.send-btn svg{width:20px;height:20px;}

/* Avatar color palette */
.av-1{background:linear-gradient(135deg,#6c63ff,#8b5cf6);}
.av-2{background:linear-gradient(135deg,#00d2ff,#0ea5e9);}
.av-3{background:linear-gradient(135deg,#ff4d6a,#f43f5e);}
.av-4{background:linear-gradient(135deg,#00e676,#10b981);}
.av-5{background:linear-gradient(135deg,#ff9800,#f59e0b);}
.av-6{background:linear-gradient(135deg,#e040fb,#a855f7);}
</style>
</head>
<body>

<!-- ===== SIDEBAR ===== -->
<div class="sidebar">
  <div class="sidebar-header">
    <div class="brand">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
      </svg>
      <h1>Cipher<span>Chat</span></h1>
      <span class="user-badge" id="myBadge"></span>
    </div>
    <div class="search-box">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" id="searchInput" placeholder="Search contacts..." oninput="filterContacts()">
    </div>
  </div>

  <div class="contacts" id="contactList"></div>

  <div class="sidebar-footer">
    <div class="footer-actions">
      <button class="profile-icon-btn" onclick="openProfile()" title="Open profile" aria-label="Open profile">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
          <circle cx="12" cy="7" r="4"/>
        </svg>
      </button>
    </div>
    <button class="logout-btn" onclick="logout()">
      <svg style="width:14px;height:14px;vertical-align:-2px;margin-right:6px;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      Logout
    </button>
  </div>
</div>

<!-- ===== CHAT AREA ===== -->
<div class="chat-area" id="chatArea">
  <!-- Empty state (default) -->
  <div class="empty-state" id="emptyState">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
    </svg>
    <h2>CipherChat</h2>
    <p>Select a contact to start a conversation.<br>All messages are end-to-end encrypted.</p>
  </div>

  <!-- Active chat (hidden until contact selected) -->
  <div id="activeChat" style="display:none;flex:1;flex-direction:column;">
    <div class="chat-header" id="chatHeader">
      <div class="avatar av-1" id="chatAvatar">?</div>
      <div class="header-info">
        <div class="name" id="chatName">—</div>
        <div class="status-line"><div class="dot"></div><span>Online — encrypted</span></div>
      </div>
      <div class="e2ee-badge">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
        E2E Encrypted
      </div>
    </div>

    <div class="messages" id="chatMessages"></div>

    <div class="input-area">
      <input type="text" id="msgInput" placeholder="Type a message..." onkeydown="if(event.key==='Enter')sendMessage()">
      <button class="send-btn" onclick="sendMessage()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>
  </div>
</div>

<script>
// ===== STATE =====
const token = localStorage.getItem('token');
const myUsername = localStorage.getItem('username');

const apiParam = new URLSearchParams(window.location.search).get('api');
if (apiParam) {
  localStorage.setItem('api_base_url', apiParam.trim().replace(/\/$/, ''));
}
if (!localStorage.getItem('api_base_url') && window.location.hostname.endsWith('pages.dev')) {
  const enteredApi = window.prompt('Enter your backend API URL (Render):', 'https://your-service.onrender.com');
  if (enteredApi) {
    localStorage.setItem('api_base_url', enteredApi.trim().replace(/\/$/, ''));
  }
}
const API_BASE_URL = (localStorage.getItem('api_base_url') || window.location.origin).replace(/\/$/, '');

function apiUrl(path) {
  return API_BASE_URL + path;
}

function wsUrl(path) {
  const base = new URL(API_BASE_URL);
  const protocol = base.protocol === 'https:' ? 'wss:' : 'ws:';
  return `${protocol}//${base.host}${path}`;
}

if (!token || !myUsername) { window.location.href = '/auth'; }

document.getElementById('myBadge').textContent = myUsername;

let selectedUser = null;
let allContacts = [];
const messageStore = {};       // { username: [ {from,text,time} ] }
const recipientKeyCache = {};  // { username: CryptoKey(public) }
let myPrivateKey = null;       // CryptoKey (ECDH private)
let conversationLoadVersion = 0;

const avatarColors = ['av-1','av-2','av-3','av-4','av-5','av-6'];
function avClass(name) { return avatarColors[name.charCodeAt(0) % avatarColors.length]; }
function initials(name) { return name.slice(0,2).toUpperCase(); }
function safeProfileImage(image) {
  if (!image || typeof image !== 'string') return '';
  const isValidDataUrl = /^data:image\/[a-zA-Z0-9.+-]+;base64,[A-Za-z0-9+/=]+$/.test(image);
  return isValidDataUrl ? image : '';
}
function findUser(username) {
  return allContacts.find(u => u.username === username) || null;
}

// ===== CRYPTO HELPERS =====
async function loadMyPrivateKey() {
  const raw = localStorage.getItem('e2ee_private_key');
  if (!raw) return null;
  const jwk = JSON.parse(raw);
  return window.crypto.subtle.importKey('jwk', jwk, { name:'ECDH', namedCurve:'P-256' }, false, ['deriveKey','deriveBits']);
}

async function fetchRecipientPublicKey(username) {
  if (recipientKeyCache[username]) return recipientKeyCache[username];
  try {
    const res = await fetch(apiUrl('/public-key/' + username));
    if (!res.ok) return null;
    const data = await res.json();
    const jwk = JSON.parse(data.public_key_jwk);
    const key = await window.crypto.subtle.importKey('jwk', jwk, { name:'ECDH', namedCurve:'P-256' }, false, []);
    recipientKeyCache[username] = key;
    return key;
  } catch { return null; }
}

async function deriveAESKey(privateKey, publicKey) {
  return window.crypto.subtle.deriveKey(
    { name:'ECDH', public: publicKey },
    privateKey,
    { name:'AES-GCM', length:256 },
    false,
    ['encrypt','decrypt']
  );
}

async function encryptMessage(text, recipientUsername) {
  const pubKey = await fetchRecipientPublicKey(recipientUsername);
  if (!pubKey || !myPrivateKey) return null;
  const aesKey = await deriveAESKey(myPrivateKey, pubKey);
  const iv = window.crypto.getRandomValues(new Uint8Array(12));
  const encoded = new TextEncoder().encode(text);
  const cipherBuf = await window.crypto.subtle.encrypt({ name:'AES-GCM', iv }, aesKey, encoded);
  return {
    ciphertext: btoa(String.fromCharCode(...new Uint8Array(cipherBuf))),
    iv: btoa(String.fromCharCode(...iv))
  };
}

async function decryptMessageForPeer(ciphertextB64, ivB64, peerUsername) {
  try {
    const pubKey = await fetchRecipientPublicKey(peerUsername);
    if (!pubKey || !myPrivateKey) return '[decryption failed]';
    const aesKey = await deriveAESKey(myPrivateKey, pubKey);
    const cipherBuf = Uint8Array.from(atob(ciphertextB64), c => c.charCodeAt(0));
    const iv = Uint8Array.from(atob(ivB64), c => c.charCodeAt(0));
    const plainBuf = await window.crypto.subtle.decrypt({ name:'AES-GCM', iv }, aesKey, cipherBuf);
    return new TextDecoder().decode(plainBuf);
  } catch {
    return '[decryption failed]';
  }
}

function timeNow() {
  return new Date().toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' });
}

// ===== CONTACTS =====
async function loadContacts() {
  try {
    const res = await fetch(apiUrl('/users'), { headers: { Authorization: 'Bearer ' + token } });
    if (!res.ok) { window.location.href = '/auth'; return; }
    const users = await res.json();
    allContacts = users.map(u => ({
      ...u,
      isSelf: u.username === myUsername
    }));
    // Put self at the top like WhatsApp's "Message yourself"
    allContacts.sort((a, b) => b.isSelf - a.isSelf);
    renderContacts(allContacts);
  } catch {}
}

function renderContacts(list) {
  const container = document.getElementById('contactList');
  container.innerHTML = '';
  list.forEach(u => {
    const div = document.createElement('div');
    div.className = 'contact' + (selectedUser === u.username ? ' active' : '');
    div.onclick = () => selectUser(u.username);

    const displayName = u.isSelf ? u.username + ' <span style="color:var(--text-secondary);font-size:11px;">(You)</span>' : u.username;
    const unread = messageStore[u.username]?.some(m => m.unread) ? '<span style="color:var(--accent);font-size:11px;font-weight:700;">●</span>' : '';
    const lastMsg = messageStore[u.username]?.length
      ? messageStore[u.username][messageStore[u.username].length - 1].text
      : 'Tap to start chatting';
    const photo = safeProfileImage(u.profile_image);
    const avatarMarkup = photo
      ? `<img src="${photo}" alt="${u.username} profile picture">`
      : initials(u.username);

    div.innerHTML = `
      <div class="avatar ${avClass(u.username)}">
        ${avatarMarkup}
        <div class="status-dot"></div>
      </div>
      <div class="info">
        <div class="name">${displayName} ${unread}</div>
        <div class="last-msg">${lastMsg.length > 32 ? lastMsg.slice(0,32)+'…' : lastMsg}</div>
      </div>
    `;
    container.appendChild(div);
  });
}

function filterContacts() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  renderContacts(allContacts.filter(u => u.username.toLowerCase().includes(q)));
}

async function selectUser(username) {
  selectedUser = username;
  const loadVersion = ++conversationLoadVersion;
  // Mark messages as read
  if (messageStore[username]) messageStore[username].forEach(m => m.unread = false);

  document.getElementById('emptyState').style.display = 'none';
  const ac = document.getElementById('activeChat');
  ac.style.display = 'flex';

  const chatAvatar = document.getElementById('chatAvatar');
  const selected = findUser(username);
  const selectedPhoto = safeProfileImage(selected?.profile_image);
  chatAvatar.className = 'avatar ' + avClass(username);
  chatAvatar.innerHTML = selectedPhoto
    ? `<img src="${selectedPhoto}" alt="${username} profile picture">`
    : initials(username);
  document.getElementById('chatName').textContent = username;

  await loadConversation(username, loadVersion);
  renderMessages();
  renderContacts(allContacts.filter(u =>
    u.username.toLowerCase().includes(document.getElementById('searchInput').value.toLowerCase())
  ));
  document.getElementById('msgInput').focus();
}

async function loadConversation(username, loadVersion) {
  try {
    const res = await fetch(apiUrl('/messages/' + encodeURIComponent(username)), {
      headers: { Authorization: 'Bearer ' + token }
    });
    if (!res.ok) return;

    const rows = await res.json();
    const loaded = [];

    for (const row of rows) {
      const peerForDecrypt = row.sender === myUsername ? row.recipient : row.sender;
      const text = row.iv
        ? await decryptMessageForPeer(row.ciphertext, row.iv, peerForDecrypt)
        : row.ciphertext;

      loaded.push({
        from: row.sender,
        text,
        time: timeNow(),
        unread: false
      });
    }

    if (loadVersion !== conversationLoadVersion || selectedUser !== username) return;
    messageStore[username] = loaded;
  } catch {}
}

function renderMessages() {
  const box = document.getElementById('chatMessages');
  box.innerHTML = '';
  const msgs = messageStore[selectedUser] || [];
  msgs.forEach(m => {
    const div = document.createElement('div');
    const isSent = m.from === myUsername;
    div.className = 'msg ' + (isSent ? 'sent' : 'received');
    div.innerHTML =
      (!isSent ? `<span class="sender-label">${m.from}</span>` : '') +
      escapeHtml(m.text) +
      `<div class="meta">${m.time}
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      </div>`;
    box.appendChild(div);
  });
  box.scrollTop = box.scrollHeight;
}

function escapeHtml(str) {
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

// ===== SEND =====
async function sendMessage() {
  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  if (!text || !selectedUser) return;
  input.value = '';

  const encrypted = await encryptMessage(text, selectedUser);
  if (!encrypted) {
    addMsg(selectedUser, { from: myUsername, text, time: timeNow() });
    ws.send(JSON.stringify({ to: selectedUser, ciphertext: text, iv: '' }));
    return;
  }

  ws.send(JSON.stringify({
    to: selectedUser,
    ciphertext: encrypted.ciphertext,
    iv: encrypted.iv
  }));

  addMsg(selectedUser, { from: myUsername, text, time: timeNow() });
}

function addMsg(contactUsername, msgObj) {
  if (!messageStore[contactUsername]) messageStore[contactUsername] = [];
  messageStore[contactUsername].push(msgObj);
  if (selectedUser === contactUsername) renderMessages();
  renderContacts(allContacts.filter(u =>
    u.username.toLowerCase().includes(document.getElementById('searchInput').value.toLowerCase())
  ));
}

// ===== WEBSOCKET =====
const ws = new WebSocket(wsUrl(`/ws/${token}`));

ws.onmessage = async function(event) {
  const data = JSON.parse(event.data);
  const sender = data.from;

  // Ignore our own echoed messages — we already added them locally
  // UNLESS we are chatting with ourselves
  if (sender === myUsername && selectedUser !== myUsername) return;
  if (sender === myUsername && selectedUser === myUsername) {
    // Skip because we already added it in sendMessage()
    return;
  }

  let plaintext;
  if (data.iv) {
    plaintext = await decryptMessageForPeer(data.ciphertext, data.iv, sender);
  } else {
    plaintext = data.ciphertext;
  }

  const msgObj = { from: sender, text: plaintext, time: timeNow(), unread: sender !== selectedUser };
  addMsg(sender, msgObj);
};

ws.onclose = function() {
  console.log('WebSocket closed');
};

// ===== LOGOUT =====
function logout() {
  const confirmed = window.confirm('Are you sure you want to log out?');
  if (!confirmed) return;
  localStorage.clear();
  window.location.href = '/auth';
}

function openProfile() {
  window.location.href = '/profile';
}

// ===== INIT =====
(async function init() {
  myPrivateKey = await loadMyPrivateKey();
  await loadContacts();
})();
</script>
